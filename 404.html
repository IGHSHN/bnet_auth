<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
</head>
<body>
<script>
    var base = "/bnet_auth/";
    var path = window.location.pathname;
    var key  = path.replace(base, "").replace(/\/$/, "");
    if (key && key.length > 0) {
        window.location.replace(base + "?key=" + key);
    } else {
        window.location.replace(base);
    }
</script>
</body>
</html>
